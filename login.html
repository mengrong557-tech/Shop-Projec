<!DOCTYPE html>
<html>

<head>
    <title>Login Page</title>
    <link rel="stylesheet" href="cssstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="login-box">
        <table class="">
            <h1 class="h1">Login</h1>

            <tr>
                <td colspan="2" class="loginbox"><i class="fa fa-envelope"></i> Username:</td>
                <td rowspan="1" class="login"><input type="text" placeholder=""></td>
            </tr>

            <tr>
                <td colspan="2" class="loginbox"><i class="fa fa-key"></i> Password:</td>
                <td class="login"><input type="password" placeholder=""></td>
            </tr>
            <tr>
                <td class="login"><input type="submit" value="Login"></td>
            </tr>
        </table>
        <table>
    </div>
</body>

</html>
